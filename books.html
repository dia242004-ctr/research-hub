<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#EEF2F9;--panel:#FFFFFF;--line:#D7DEEC;--c:#7C3AED;--cdim:rgba(124,58,237,.12);--ink:#16203B;--dim:#586289;--faint:#97A0BC;--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh;background-image:radial-gradient(circle at 12% 8%,rgba(124,58,237,.08),transparent 42%);background-attachment:fixed}
  .wrap{max-width:920px;margin:0 auto;padding:40px 28px 60px}
  .back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:.5px;margin-bottom:34px;transition:.15s}
  .back:hover{color:var(--c);gap:11px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--c);text-transform:uppercase}
  h1{font-family:var(--disp);font-size:46px;font-weight:700;letter-spacing:-.02em;margin:8px 0 10px;display:flex;align-items:center;gap:14px}
  .ico{width:56px;height:56px;border-radius:15px;background:var(--cdim);display:flex;align-items:center;justify-content:center;font-size:28px}
  .sub{color:var(--dim);font-size:16px;max-width:600px;line-height:1.55}
  .rule{height:3px;width:56px;background:var(--c);border-radius:3px;margin:24px 0 32px}
  .placeholder{background:var(--panel);border:1px dashed var(--line);border-radius:16px;padding:40px 30px;text-align:center;color:var(--faint)}
  .placeholder .big{font-family:var(--disp);font-size:20px;color:var(--dim);font-weight:600;margin-bottom:8px}
  .placeholder p{font-size:14px;line-height:1.6;max-width:460px;margin:0 auto}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Research Hub</a>
  <div class="eyebrow">Reading & Notes</div>
  <h1><span class="ico">📚</span> Books</h1>
  <p class="sub">Investing classics, reading notes and the lessons worth keeping.</p>
  <div class="rule"></div>
  <div class="placeholder">
    <div class="big">Your library starts here</div>
    <p>This page is ready for content — book summaries, key takeaways, quotes, and a reading list. Tell me what to add and I'll build it out.</p>
  </div>
</div>
</body>
</html>
